<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="html learning">
    <title>Html Learning</title>
    <link rel="icon" href="img/xicon.png">
    <style>
        .head {
            text-align: center;
            border: 2px solid black;
            border-radius: 25px;
            padding: 10px;
            margin-left: 200px;
            margin-right: 200px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .p {
            text-align: center;
        }

        .thq {
            background-color: green;
            color: white;
        }

        .thw,
        .the,
        .thr {
            background-color: blue;
            color: aliceblue;
        }

        button {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1 class="head">Hello!</h1>
    <p class="p">Wellcome to my first web page :)</p>
    <hr>
    <p class="pq">
        hallo, selamat datang di halaman web pertama saya. disini saya baru memahami beberapa tag di html lho!.
    </p>
    <table border="1">
        <tr>
            <th class="thq" colspan="3">tag yang baru saya pahami</th>
        </tr>
        <tr>
            <th class="thw">html</th>
            <th class="the">css</th>
            <th class="thr">js</th>
        </tr>
        <tr>
            <td>p</td>
            <td>bg-c</td>
            <td rowspan="4">belum</td>
        </tr>
        <tr>
            <td>h1-6</td>
            <td>color</td>
        </tr>
        <tr>
            <td>br</td>
            <td>tealign</td>
        </tr>
        <tr>
            <td>hr</td>
            <td>text-size</td>
        </tr>
    </table>
    <button onclick="document.location='poto.html'">next page</button>
</body>

</html>
